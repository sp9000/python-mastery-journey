name: Python CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Run hello script
      run: python 01-foundations/hello_mastery.py