# .github/workflows/python-check.yml
name: Python CI

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pytest
      run: pip install pytest

    - name: Run Module 2 tests
      run: PYTHONPATH=. pytest core_types_two/tests/ -v

    - name: Run expense script smoke test
      run: python core_types_two/expenses.py total